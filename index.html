<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <audio src="game sound/Game Over.wav" class="over"></audio>
    <audio src="game sound/click.mp3" class="start" ></audio>
    <audio src="game sound/Start.wav" class="showGame" loop></audio>
    <div class="main">
        <div class="startGame">
            <button>Start Game</button>
        </div>
        <div class="panel">
            <div class="ptop">
                <div class="elem">
<h3>Hit</h3> <div id="hitValue" class="box">5</div>
                </div>
                <div class="elem">
<h3>Timer</h3> <div id="timerValue" class="box">60</div>
                </div>
                <div class="elem">
                    <h3>Score</h3> <div id="scoreValue" class="box">0</div>
                </div>
            </div>
            <div class="pbtm">
                 
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js" integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="script.js"></script>
</body>
</html>
